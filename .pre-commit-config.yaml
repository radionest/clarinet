# See https://prek.j178.dev/ for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=600']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.8
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: uv run mypy clarinet
        language: system
        pass_filenames: false
        files: ^clarinet/
        exclude: ^tests/
        types: [python]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['-e', 'SC1090,SC1091']

  - repo: local
    hooks:
      # Route HTTP/payload serialization through clarinet.utils.serialization.json_dumps_bytes.
      # Targets only the patterns that previously caused the UUID-not-JSON-serializable bug:
      # `orjson.dumps(...)` anywhere, and `json.dumps(..., default=...)` (the payload shape).
      # Plain `json.dumps(obj)` without default= (cursor tokens, file writers, tests) is fine.
      # `[^()]*(?:\([^()]*\)[^()]*)*` allows one level of nested parens in the first arg,
      # so `json.dumps(make_payload(x), default=str)` is caught. Multi-line `dumps(...)`
      # and 2+ levels of nesting are an accepted gap — pygrep runs per-line, no (?s).
      - id: forbid-direct-payload-dumps
        name: payload dumps must go through clarinet.utils.serialization.json_dumps_bytes
        language: pygrep
        entry: '\borjson\.dumps\(|\bjson\.dumps\([^()]*(?:\([^()]*\)[^()]*)*,\s*default='
        files: ^clarinet/.*\.py$
        exclude: ^clarinet/utils/(serialization|db_manager)\.py$

  - repo: local
    hooks:
      - id: test-py312
        name: Quick test on Python 3.12
        entry: bash -c 'command -v uv >/dev/null || exit 0; make test-py312'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
