# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.12.12
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - fastapi
          - sqlmodel
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - pydicom
          - loguru
          - alembic
          - sqlalchemy
          - httpx
          - types-requests
          - types-jsonschema
          - types-aiofiles
          - bcrypt
          - python-jose
          - aiofiles
          - taskiq>=0.12.0
          - taskiq-aio-pika>=0.6.0
          - taskiq-redis>=1.0.0
        exclude: ^tests/

  - repo: local
    hooks:
      - id: test-py312
        name: Quick test on Python 3.12
        entry: bash -c 'command -v uv >/dev/null || exit 0; make test-py312'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true