# See https://prek.j178.dev/ for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=600']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.8
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        files: ^clarinet/
        additional_dependencies:
          - fastapi
          - sqlmodel
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - pydicom
          - loguru
          - alembic
          - sqlalchemy
          - httpx
          - types-requests
          - types-jsonschema
          - types-aiofiles
          - bcrypt
          - python-jose
          - aiofiles
          - taskiq>=0.12.0
          - taskiq-aio-pika>=0.6.0
          - taskiq-redis>=1.0.0
          - scipy-stubs
        exclude: ^tests/

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['-e', 'SC1090,SC1091']

  - repo: local
    hooks:
      - id: test-py312
        name: Quick test on Python 3.12
        entry: bash -c 'command -v uv >/dev/null || exit 0; make test-py312'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
