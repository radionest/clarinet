name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release (otherwise just build)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          gleam-version: "1.5.0"
          otp-version: "26.0"

      - name: Configure git for HTTPS access to dependencies
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Cache Gleam dependencies
        uses: actions/cache@v4
        with:
          path: clarinet/frontend/build/packages
          key: gleam-deps-${{ runner.os }}-${{ hashFiles('clarinet/frontend/gleam.toml', 'clarinet/frontend/manifest.toml') }}
          restore-keys: |
            gleam-deps-${{ runner.os }}-

      - name: Build frontend
        run: bash scripts/build_frontend.sh

      - name: Verify frontend output
        run: |
          test -f clarinet/static/index.html || { echo "ERROR: Frontend build failed — no index.html"; exit 1; }
          test -d clarinet/static/js || { echo "ERROR: Frontend build failed — no js dir"; exit 1; }
          echo "Frontend build verified:"
          find clarinet/static -type f | head -20

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build --wheel

      - name: Verify wheel contains static files
        run: |
          python3 -m zipfile -l dist/*.whl | grep "clarinet/static/" | head -5
          echo "Wheel verified: contains frontend static files"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: clarinet-wheel
          path: dist/*.whl

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: clarinet-wheel
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d-%H%M%S)}"
          gh release create "$TAG" \
            --title "Clarinet $TAG" \
            --generate-notes \
            dist/*.whl
