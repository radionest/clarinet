name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTEST_UNIT_MARKERS: "not pipeline and not dicom and not slicer and not schema"

jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: >-
          uv run pytest tests/
          -n auto --dist loadgroup
          -m "${{ env.PYTEST_UNIT_MARKERS }}"
          -q

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: >-
          uv run pytest tests/
          -n auto --dist loadgroup
          -m "${{ env.PYTEST_UNIT_MARKERS }}"
          --json-report-file=test-report.json
          -q

  test-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run schema tests
        run: make test-schema
