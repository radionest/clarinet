name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: make test-unit

  test-schema:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run schema tests
        run: make test-schema
