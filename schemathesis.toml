# Schemathesis configuration
# Docs: https://schemathesis.readthedocs.io/

[generation]
max-examples = 50
mode = "all"

[phases.stateful]
enabled = true

[output.sanitization]
enabled = false

# Check exclusions (apply to all tests, including stateful)
# - ignored_auth: false positive — auth is overridden (mock superuser) in conftest
# - negative_data_rejection: FastAPI by design ignores unknown query params;
#   the check flags every endpoint for accepting ?x-schemathesis-unknown-property=42.
#   Body-level validation is enforced via extra="forbid" on Pydantic models instead.
# - unsupported_method: Starlette returns 404 (not 405) for sub-path action
#   endpoints and fastapi-users auto-generated endpoints
#
# positive_data_acceptance is ENABLED (schema-valid data must be accepted; the
# check fails only on 400/422 — 404/409 are allowed). Kept green by advertising
# param constraints in OpenAPI so hypothesis can't generate rejectable values —
# e.g. study.py PatientIdPath (pattern) and pipeline.py record_id (int32 bounds)
# — not by disabling it (PR #437's "constraints not advertised in OpenAPI" was
# wrong: PatientIdPath advertises them fine). Operations whose validity OpenAPI
# cannot express (records/find opaque cursor, records/types nested JSON-Schema)
# stay opted out via excluded_checks in tests/schema/test_critical_endpoints.py
# and EXCLUDED_PATTERN in tests/schema/test_api_schema.py.
[checks.ignored_auth]
enabled = false

[checks.negative_data_rejection]
enabled = false

[checks.unsupported_method]
enabled = false
