# Schemathesis configuration
# Docs: https://schemathesis.readthedocs.io/

[generation]
max-examples = 50
mode = "all"

[phases.stateful]
enabled = true

[output.sanitization]
enabled = false

# Check exclusions (apply to all tests, including stateful)
# - ignored_auth: false positive — auth is overridden (mock superuser) in conftest
# - negative_data_rejection: custom validators not reflected in schema
# - unsupported_method: Starlette returns 404 (not 405) for sub-path action
#   endpoints and fastapi-users auto-generated endpoints
[checks.ignored_auth]
enabled = false

[checks.negative_data_rejection]
enabled = false

[checks.unsupported_method]
enabled = false
