project_name = "NDT Comparative Study"
project_description = "Comparative evaluation of non-destructive testing (NDT) imaging modalities for internal-defect detection in cast parts"
extra_roles = ["inspector_CT", "inspector_UT", "inspector_MCT", "inspector_CT-HD", "mrb", "technician", "analyst"]
debug = true
log_level = "DEBUG"
log_console_level = "INFO"

port = 8000
host = "127.0.0.1"

database_driver = "sqlite"
database_name = "clarinet_demo"
storage_path = "./data"
anon_id_prefix = "DEMO_PART"
secret_key = "demo-secret-key-not-for-production"
admin_password = "admin123"
recordflow_enabled = true
pipeline_enabled = true

# RabbitMQ (on klara)
rabbitmq_host = "192.168.122.151"
rabbitmq_login = "clarinet_test"
rabbitmq_password = "clarinet_test"

anon_send_to_pacs = true
config_mode = "python"
config_record_types_file = "definitions/record_types.py"
# config_context_hydrators_file defaults to "slicer_hydrators.py" (plan root)
recordflow_paths = ["./tasks/workflows"]
frontend_enabled = true

# DICOM settings (local node)
dicom_aet = "CLARINET"
dicom_port = 11112

# Test PACS server (Orthanc on klara)
pacs_aet = "ORTHANC"
pacs_host = "192.168.122.151"
pacs_port = 4242
