# Clarinet nginx reverse proxy
# Placeholder __PATH_PREFIX__ is replaced by install-clarinet.sh at deploy time

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    # HTTP/2 multiplexes ~100 streams per TCP connection, lifting the browser's
    # ~6-connections-per-host HTTP/1.1 cap. Each open SSE stream (/api/events)
    # otherwise holds a connection slot for its lifetime and starves ordinary
    # REST requests across the whole origin. nginx >= 1.25.1; for older nginx
    # use `listen 443 ssl http2 default_server;` instead.
    http2 on;
    server_name _;

    ssl_certificate     /etc/ssl/certs/clarinet-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/clarinet-selfsigned.key;

    # Allow large uploads (DICOM files)
    client_max_body_size 500M;

    # Proxy all requests under PATH_PREFIX to uvicorn
    # Trailing slash in proxy_pass strips the location prefix
    location __PATH_PREFIX__ {
        proxy_pass http://127.0.0.1:8000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use). HTTP/2 is terminated here; the
        # upstream to uvicorn stays HTTP/1.1 — intentional, the connection cap
        # only exists on the browser<->nginx leg.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE (/api/events) streams are not buffered: the endpoint sets
        # `X-Accel-Buffering: no`, which nginx honors per-response even under a
        # global `proxy_buffering on`, so no extra location block is needed.
        # If a global `gzip on` is ever added, exclude text/event-stream.

        # Timeouts for long operations
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
    }
}
