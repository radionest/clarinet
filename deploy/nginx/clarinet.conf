# Clarinet nginx reverse proxy
# Placeholder __PATH_PREFIX__ is replaced by install-clarinet.sh at deploy time

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/certs/clarinet-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/clarinet-selfsigned.key;

    # Allow large uploads (DICOM files)
    client_max_body_size 500M;

    # Proxy all requests under PATH_PREFIX to uvicorn
    # Trailing slash in proxy_pass strips the location prefix
    location __PATH_PREFIX__ {
        proxy_pass http://127.0.0.1:8000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long operations
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
    }
}
