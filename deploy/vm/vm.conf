# Clarinet VM Configuration
# Used by vm.sh for KVM/libvirt test VM provisioning

# VM parameters
VM_NAME="clarinet-test"
VM_RAM=4096          # MB
VM_VCPUS=2
VM_DISK_SIZE=20      # GB

# Cloud image
IMAGE_URL="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
IMAGE_NAME="noble-server-cloudimg-amd64.img"

# SSH access
SSH_KEY_PATH="${HOME}/.ssh/clarinet-vm"
VM_USER="clarinet"

# Storage paths
DATA_DIR="${HOME}/.local/share/clarinet-deploy"
IMAGES_DIR="${DATA_DIR}/images"
DISKS_DIR="${DATA_DIR}/disks"

# Deployment: nginx sub-path prefix
# Default "/" — root deployment
# Set to "/nir_liver/" etc. for sub-path deployment testing
PATH_PREFIX="/liver_nir/"

# PACS server (Orthanc)
# Default "localhost" — PACS on the same VM
PACS_HOST="192.168.122.151"
