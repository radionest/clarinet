# Clarinet VM Configuration
# Used by vm.sh for KVM/libvirt test VM provisioning

# VM parameters
VM_NAME="clarinet-test"
VM_RAM=4096          # MB
VM_VCPUS=2
VM_DISK_SIZE=20      # GB

# Cloud image
IMAGE_URL="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
IMAGE_NAME="noble-server-cloudimg-amd64.img"

# SSH access
SSH_KEY_PATH="${HOME}/.ssh/clarinet-vm"
VM_USER="clarinet"

# Storage paths
DATA_DIR="${HOME}/.local/share/clarinet-deploy"
IMAGES_DIR="${DATA_DIR}/images"
DISKS_DIR="${DATA_DIR}/disks"

# Dedicated known_hosts file for VM SSH connections. Isolated from the
# user's global ~/.ssh/known_hosts so libvirt IP reuse (which invalidates
# prior host keys) can be purged without touching unrelated SSH state.
KNOWN_HOSTS_FILE="${DATA_DIR}/known_hosts"

# Deployment: nginx sub-path prefix
# Default "/" — root deployment
# Set to "/nir_liver/" etc. for sub-path deployment testing
PATH_PREFIX="/liver_nir/"

# PACS server (Orthanc)
# Default "localhost" — PACS on the same VM
PACS_HOST="192.168.122.151"

# Source Orthanc for test DICOM data (used during bake)
# fetch-test-dicom.sh pulls studies from this server, anonymizes them,
# and bake-image.sh uploads the result into the VM's Orthanc.
DICOM_SOURCE_URL="http://192.168.122.151:8042"
DICOM_SOURCE_PATIENT=""  # Patient name to fetch (prompted interactively if empty)
DICOM_SOURCE_LIMIT=2     # Max studies to fetch (0 = all)
