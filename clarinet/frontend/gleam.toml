name = "clarinet_frontend"
version = "0.1.0"
target = "javascript"
description = "Clarinet imaging trials framework frontend"

[dependencies]
lustre = "~> 5.6"

gleam_json = "~> 3.0"
gleam_javascript = "~> 1.0"
gleam_stdlib = "~> 0.63"
gleam_http = "~> 4.3"
modem = "~> 2.1"
gleam_fetch = "~> 1.3"
formosh = { git = "git@github.com:radionest/gleam_formosh.git", ref = "main" }
plinth = "~> 0.7.2"
lazy_const = "~> 1.0"
multipart_form = "~> 1.0"
[dev-dependencies]
gleeunit = "~> 1.4"
lustre_dev_tools = "~> 2.3"

[javascript]
entry_point = "clarinet_frontend.gleam"
output = "build/dev/javascript/clarinet_frontend.mjs"

[tools.lustre.bin]
bun = "system"

# Default build config. outdir is the single source of truth for output path.
# Minification is NOT set here — pass --minify explicitly in production builds only.
[tools.lustre.build]
outdir = "../../clarinet/static"
