# Test services for local development.
#
# Brings up the same RabbitMQ image / credentials that GH Actions CI uses
# (.github/workflows/ci.yml: `services.rabbitmq`) so a local pipeline run
# matches the CI environment 1:1.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   make test-fast          # or: make test-integration / make test-all-stages
#   docker compose -f docker-compose.test.yml down
#
# Defaults in tests/config.py expect this stack on localhost — no env vars
# needed. To point tests at a remote VM (e.g. klara) instead, see
# .env.test.example. Do NOT run Docker RabbitMQ and an apt-installed
# RabbitMQ on the same host: both bind 5672.

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: clarinet-test-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: clarinet_test
      RABBITMQ_DEFAULT_PASS: clarinet_test
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
